<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colect × Le New Black — Branding Questionnaire (v3)</title>
<style>
  :root{--charcoal:#212322;--canvas:#F1F2F3;--coral:#EE536B;--coral-dark:#d8405a;--muted:#6b6d6c;--line:#d7d8d9;--white:#fff;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--charcoal);background:var(--canvas);-webkit-font-smoothing:antialiased;overflow-y:auto;}
  #progress{position:fixed;top:0;left:0;height:5px;width:0;background:var(--coral);transition:width .4s ease;z-index:50}
  #brand{position:fixed;top:18px;left:24px;font-weight:800;letter-spacing:.5px;font-size:15px;z-index:40}
  #brand span{color:var(--coral)} #brand small{font-weight:600;color:var(--muted);letter-spacing:0}
  #counter{position:fixed;top:18px;right:24px;font-size:13px;color:var(--muted);z-index:40}
  #stage{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:72px 24px 96px}
  .screen{width:100%;max-width:760px;opacity:0;transform:translateY(18px);transition:opacity .4s ease,transform .4s ease}
  .screen.in{opacity:1;transform:none}
  .group{font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--coral);margin-bottom:18px}
  .qhead{display:flex;gap:14px;align-items:flex-start}
  .qnum{color:var(--coral);font-weight:700;font-size:24px;line-height:1.4;display:flex;align-items:center;gap:4px;white-space:nowrap}
  .qnum svg{width:16px;height:16px}
  h1.q{font-size:29px;line-height:1.32;font-weight:600;letter-spacing:-.2px}
  .help{color:var(--muted);font-size:17px;margin-top:12px;line-height:1.5}
  .quote{border-left:3px solid var(--coral);padding:10px 0 10px 18px;margin:18px 0 4px;font-style:italic;color:#3a3c3b;font-size:18px;line-height:1.5}
  .body{margin-top:26px}
  textarea,input.text{width:100%;font-family:inherit;font-size:22px;color:var(--charcoal);background:transparent;border:none;border-bottom:2px solid var(--line);padding:10px 2px;resize:none;outline:none;transition:border-color .2s}
  textarea{min-height:60px}
  textarea:focus,input.text:focus{border-color:var(--coral)}
  textarea::placeholder,input.text::placeholder{color:#aeb0af}
  .sublabel{font-size:15px;font-weight:600;color:var(--muted);margin:22px 0 4px}
  .options{display:flex;flex-direction:column;gap:11px}
  .opt{display:flex;align-items:center;gap:14px;border:1.5px solid var(--line);border-radius:10px;padding:13px 16px;cursor:pointer;background:rgba(255,255,255,.45);transition:.15s;font-size:18px}
  .opt:hover{border-color:var(--coral);background:rgba(238,83,107,.05)}
  .opt.sel{border-color:var(--coral);background:rgba(238,83,107,.12)}
  .key{width:28px;height:28px;flex:none;border:1.5px solid var(--charcoal);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
  .opt.sel .key{background:var(--coral);border-color:var(--coral);color:#fff}
  /* chips for mood words */
  .chips{display:flex;flex-wrap:wrap;gap:10px}
  .chip{border:1.5px solid var(--line);border-radius:999px;padding:9px 16px;cursor:pointer;background:rgba(255,255,255,.5);font-size:17px;transition:.15s}
  .chip:hover{border-color:var(--coral)} .chip.sel{background:var(--coral);border-color:var(--coral);color:#fff}
  /* rank */
  .rank{display:flex;flex-direction:column;gap:10px}
  .ritem{display:flex;align-items:center;gap:14px;border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;background:rgba(255,255,255,.55);font-size:18px}
  .rbadge{width:30px;height:30px;flex:none;border-radius:50%;background:var(--coral);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px}
  .rlabel{flex:1} .rctrl{display:flex;flex-direction:column;gap:2px}
  .rctrl button{border:none;background:transparent;cursor:pointer;color:var(--muted);font-size:16px;line-height:1;padding:2px 6px;border-radius:4px}
  .rctrl button:hover{color:var(--coral);background:rgba(238,83,107,.1)}
  /* scale */
  .scale{display:flex;gap:10px;flex-wrap:wrap}
  .sbtn{width:56px;height:56px;border:1.5px solid var(--line);border-radius:10px;background:rgba(255,255,255,.5);font-size:20px;font-weight:700;cursor:pointer;transition:.15s}
  .sbtn:hover{border-color:var(--coral)} .sbtn.sel{background:var(--coral);border-color:var(--coral);color:#fff}
  .scale-ends{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-top:8px;max-width:430px}
  /* axes (tone of voice) */
  .axis{margin-bottom:18px}
  .axis-ends{display:flex;justify-content:space-between;font-size:15px;font-weight:600;margin-bottom:6px}
  .axis-btns{display:flex;gap:8px}
  .axis-btns .ab{flex:1;height:40px;border:1.5px solid var(--line);border-radius:8px;background:rgba(255,255,255,.5);cursor:pointer;font-weight:700;color:var(--muted);transition:.15s}
  .axis-btns .ab:hover{border-color:var(--coral)} .axis-btns .ab.sel{background:var(--coral);border-color:var(--coral);color:#fff}
  /* brands */
  .brands{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  @media(max-width:620px){.brands{grid-template-columns:1fr}}
  .brand{display:flex;align-items:center;gap:13px;border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;cursor:pointer;background:rgba(255,255,255,.5);transition:.15s}
  .brand:hover{border-color:var(--coral)} .brand.sel{border-color:var(--coral);background:rgba(238,83,107,.1)}
  .blogo{width:34px;height:34px;flex:none;object-fit:contain;border-radius:6px;background:#fff}
  .bmono{width:34px;height:34px;flex:none;border-radius:6px;background:var(--charcoal);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  .bname{font-size:17px;font-weight:600} .bdesc{font-size:13px;color:var(--muted);line-height:1.3}
  .blink{font-size:12px;font-weight:700;color:var(--coral);text-decoration:none;display:inline-block;margin-top:3px}
  .blink:hover{text-decoration:underline}
  .foot{margin-top:34px;display:flex;align-items:center;gap:16px}
  .ok{background:var(--coral);color:#fff;border:none;border-radius:8px;padding:13px 26px;font-size:18px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 2px 0 var(--coral-dark)}
  .ok:hover{filter:brightness(1.05)}
  .enter-hint{font-size:13px;color:var(--muted)} .enter-hint b{color:var(--charcoal)} .req{color:var(--coral);font-weight:700}
  .big{font-size:40px;font-weight:700;line-height:1.18;letter-spacing:-.5px}
  .lead{font-size:19px;color:var(--muted);margin-top:18px;line-height:1.55}
  .tag{display:inline-block;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--coral);margin-bottom:22px}
  #nav{position:fixed;right:24px;bottom:24px;display:flex;gap:1px;z-index:40}
  #nav button{width:42px;height:38px;border:none;background:var(--charcoal);color:#fff;cursor:pointer;font-size:16px}
  #nav button:first-child{border-radius:6px 0 0 6px} #nav button:last-child{border-radius:0 6px 6px 0}
  #nav button:disabled{opacity:.35;cursor:default}
  @media(max-width:560px){h1.q{font-size:23px}.big{font-size:30px}.qnum{font-size:20px}}
</style>
</head>
<body>
<div id="progress"></div>
<div id="brand">COLECT<span>.</span> × LE NEW BLACK &nbsp;<small>v3</small></div>
<div id="counter"></div>
<div id="stage"></div>
<div id="nav"><button id="prev" title="Previous">↑</button><button id="next" title="Next">↓</button></div>

<script>
const AIM=['Specialist','Fashion-native','Intelligent','International / European','Precise','Modern','Operationally strong','Elegant (not precious)','Premium (not exclusionary)','Connected','Confident','Restrained'];
const AVOID=['Luxury','Runway','Parisian-only','Couture','Atelier','Generic SaaS','Salesforce-flavoured','Cold & operational','Tech-bro','Cold-blue B2B','Avant-garde','Niche'];

const Q = [
  {type:'welcome'},

  // ---- About you ----
  {id:'NAME', group:'About you', n:1, type:'shorttext', required:true, title:'What is your first and last name?', placeholder:'Type your full name…'},
  {id:'SIDE', group:'About you', n:2, type:'choice', required:true, title:'Which side do you come from?',
   options:['Colect','Le New Black','Joined the merged company','Neither / external']},

  // ---- Strategy: validate, not discover ----
  {id:'MISSION', group:'Strategy — does this fit?', n:3, type:'scale', required:true, scaleMax:5,
   title:'How well does this capture why the company exists?',
   quote:'“To build the intelligent commercial layer for European fashion specialists — where the complex reality of modern wholesale (multi-currency, multi-language, multi-territory) becomes effortless, and every brand-retailer connection becomes smarter.”',
   help:'“Specialists” = brands that own a clear category lane — e.g. Triumph in lingerie, Marc O’Polo in lifestyle, Wales Bonner in designer.',
   ends:['1 — not us at all','5 — exactly right'], extra:'Anything you would change?'},
  {id:'POS', group:'Strategy — does this fit?', n:4, type:'scale', required:true, scaleMax:5,
   title:'How strongly do you agree this is the right thing to be known for?',
   quote:'“Wholesale, made for fashion — built for the genuinely complex reality of European brands: multi-currency, multi-language, multi-territory, multi-rights.” (Not a customer size; the problem we uniquely solve.)',
   ends:['1 — disagree','5 — strongly agree'], extra:'Anything off, or missing?'},

  // ---- Values & vision ----
  {id:'VALRANK', group:'Values & vision', n:5, type:'rank', required:true,
   title:'Rank the five proposed values, most → least true of us.',
   help:'Drag-rank: 1 = most true. No ties. (“Specialists” = brands that own a category lane — e.g. Triumph, Marc O’Polo, Wales Bonner.)',
   items:['Fashion-native','Built for specialist brands (each owns a category lane)','Operationally deep','Intelligently autonomous','Collaborative by design']},
  {id:'VALMISS', group:'Values & vision', n:6, type:'longtext', required:false,
   title:'Is anything missing from those five values that you think MUST be there?', placeholder:'Optional — what, and why?'},
  {id:'VISION', group:'Values & vision', n:7, type:'scale', required:true, scaleMax:5,
   title:'How strongly do you agree with the proposed vision?',
   quote:'“The future of wholesale is collaborative and autonomous. We’re building the intelligent commercial layer where European fashion specialists and their retailers connect, scale, and grow — so the human work of fashion can be more human, and the operational work can take care of itself.”',
   ends:['1 — not us','5 — exactly us'], extra:'What would you add, cut, or reword?'},

  // ---- Personality, mood & voice ----
  {id:'AIM', group:'Personality & mood', n:8, type:'chips', required:true, max:5,
   title:'Which words should the brand feel like?', help:'Pick up to five.', options:AIM},
  {id:'AVOID', group:'Personality & mood', n:9, type:'chips', required:true, max:3,
   title:'Which must the brand NEVER be?', help:'Pick up to three.', options:AVOID},
  {id:'VOICE', group:'Personality & mood', n:10, type:'axes', required:true,
   title:'How should the brand sound? Place us on each line.',
   axes:[
     {id:'expapp', left:'Expert', right:'Approachable'},
     {id:'boldund', left:'Bold', right:'Understated'},
     {id:'premacc', left:'Premium', right:'Accessible'},
     {id:'serpla', left:'Serious', right:'Playful'}
   ]},

  // ---- Look & feel (the real new signal) ----
  {id:'BRANDS', group:'Look & feel', n:11, type:'brands', required:true, max:3, other:true,
   title:'Which of these brands should the new Colect feel closest to?',
   help:'Pick up to three (a mix of fashion-retail and technology aesthetics on purpose). Not sure how one looks? Tap “View site ↗” on any brand to open it in a new tab.',
   brands:[
     {name:'Aesop', domain:'aesop.com', desc:'Apothecary-editorial, warm, restrained'},
     {name:'MUJI', domain:'muji.com', desc:'Quiet minimal, functional, no-logo'},
     {name:'Bang & Olufsen', domain:'bang-olufsen.com', desc:'Premium, precise, crafted'},
     {name:'COS', domain:'cosstores.com', desc:'Fashion-retail minimal, architectural'},
     {name:'Stripe', domain:'stripe.com', desc:'Clean, confident developer-tech'},
     {name:'Linear', domain:'linear.app', desc:'Sharp, dark, precise software'},
     {name:'Notion', domain:'notion.so', desc:'Friendly, approachable, soft tech'},
     {name:'Apple', domain:'apple.com', desc:'Premium mass, product-hero'},
     {name:'Patagonia', domain:'patagonia.com', desc:'Earnest, utilitarian, values-led'}
   ]},
  {id:'IMG', group:'Look & feel', n:12, type:'choice', required:true, other:true,
   title:'What should our imagery mostly show?',
   options:['The product — clothing & collections','The showroom & buying experience','People — designers, buyers, teams','Abstract & graphic','Data & product UI / screens']},
  {id:'ADMIRE', group:'Look & feel', n:13, type:'longtext', required:true,
   title:'If the brand looked and felt like a fashion brand you admire, which would it be — and why?', placeholder:'Brand + why…'},

  // ---- Open ----
  {id:'OPEN', group:'Open', n:14, type:'longtext', required:false,
   title:'Anything else about how the brand should look, feel, or sound?', placeholder:'Optional…'},

  {type:'end'}
];

const KEYS='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const stage=document.getElementById('stage'), prog=document.getElementById('progress'), counter=document.getElementById('counter');
const state={}; let i=0; let submitted=false;
const coreCount=Q.filter(q=>typeof q.n==='number').length;
const CONN='postgresql://neondb_owner:npg_C0LhoRIGUc4n@ep-odd-union-a2gu0i5p-pooler.eu-central-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require';
const RID_KEY='colect_rid_v3';

function svgArrow(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';}
function initials(n){return n.split(/[ &]/).filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();}

function render(){
  const q=Q[i];
  prog.style.width=(i/(Q.length-1)*100)+'%';
  counter.textContent = typeof q.n==='number' ? (q.n+' / '+coreCount) : '';
  document.getElementById('prev').disabled=(i===0);
  document.getElementById('next').disabled=(i===Q.length-1);
  let html='<div class="screen">';
  if(q.type==='welcome'){
    html+=`<div><div class="tag">Branding questionnaire · v3</div>
      <div class="big">Help shape the brand<br>of the merged company.</div>
      <div class="lead">14 questions · about 7–9 minutes. Much of the strategy is already drafted — most of this is you telling us whether it’s <i>right</i>, and what the brand should look and feel like.<br>Your answers save automatically; you can revisit this page anytime to change them.</div>
      <div class="foot"><button class="ok" onclick="go(1)">Start &nbsp;→</button><span class="enter-hint">press <b>Enter ↵</b></span></div></div>`;
  } else if(q.type==='end'){
    html+=`<div><div class="big">That’s it — thank you. 🎉</div>
      <div class="lead">This feeds the brand &amp; visual direction directly.</div>
      <div class="lead" id="savestatus" style="color:var(--coral);font-weight:600">Saving your answers…</div>
      <div class="foot"><button class="ok" onclick="go(-i)">↺ &nbsp;Review my answers</button></div></div>`;
  } else {
    html+=`<div class="group">${q.group}</div>
      <div class="qhead"><div class="qnum">${q.n}${svgArrow()}</div>
        <div style="flex:1"><h1 class="q">${q.title} ${q.required?'<span class="req">*</span>':''}</h1>
          ${q.quote?`<div class="quote">${q.quote}</div>`:''}
          ${q.help?`<div class="help">${q.help}</div>`:''}</div></div>
      <div class="body">${fieldHTML(q)}</div>
      <div class="foot"><button class="ok" onclick="next()">OK &nbsp;✓</button><span class="enter-hint">press <b>Enter ↵</b></span></div>`;
  }
  html+='</div>';
  stage.innerHTML=html;
  requestAnimationFrame(()=>{document.querySelector('.screen').classList.add('in'); wire(q);});
}

function otherField(){return `<div class="sublabel">Other</div><input class="text" id="other" placeholder="Something else…">`;}

function fieldHTML(q){
  if(q.type==='longtext') return `<textarea id="inp" placeholder="${q.placeholder||''}"></textarea>`;
  if(q.type==='shorttext') return `<input class="text" id="inp" placeholder="${q.placeholder||''}">`;
  if(q.type==='choice'){
    let h='<div class="options">'+q.options.map((o,k)=>`<div class="opt" data-k="${k}" onclick="pick('${q.id}',${k})"><span class="key">${KEYS[k]}</span><span>${o}</span></div>`).join('')+'</div>';
    if(q.other) h+=otherField();
    if(q.why) h+=`<div class="sublabel">${q.why}</div><input class="text" id="why" placeholder="One line…">`;
    return h;
  }
  if(q.type==='chips'){
    let h='<div class="chips">'+q.options.map((o,k)=>`<div class="chip" data-k="${k}" onclick="pickMulti('${q.id}',${k},${q.max||0})">${o}</div>`).join('')+'</div>';
    if(q.other) h+=otherField();
    return h;
  }
  if(q.type==='brands'){
    let h='<div class="brands">'+q.brands.map((b,k)=>`<div class="brand" data-k="${k}" onclick="pickMulti('${q.id}',${k},${q.max||0})">
      <img class="blogo" src="https://logo.clearbit.com/${b.domain}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <span class="bmono" style="display:none">${initials(b.name)}</span>
      <div><div class="bname">${b.name}</div><div class="bdesc">${b.desc}</div>
      <a class="blink" href="https://${b.domain}" target="_blank" rel="noopener" onclick="event.stopPropagation()">View site ↗</a></div></div>`).join('')+'</div>';
    if(q.other) h+=otherField();
    return h;
  }
  if(q.type==='scale'){
    const max=q.scaleMax||5; let b='';
    for(let s=1;s<=max;s++) b+=`<button class="sbtn" data-s="${s}" onclick="pickScale('${q.id}',${s})">${s}</button>`;
    let h=`<div class="scale">${b}</div>`;
    if(q.ends) h+=`<div class="scale-ends" style="width:${max*66}px"><span>${q.ends[0]}</span><span>${q.ends[1]}</span></div>`;
    if(q.extra) h+=`<div class="sublabel">${q.extra}</div><textarea id="extra" placeholder="Optional…"></textarea>`;
    return h;
  }
  if(q.type==='axes'){
    return q.axes.map(a=>{
      let b='';for(let s=1;s<=5;s++) b+=`<button class="ab" data-ax="${a.id}" data-s="${s}" onclick="pickAxis('${q.id}','${a.id}',${s})">${s}</button>`;
      return `<div class="axis"><div class="axis-ends"><span>${a.left}</span><span>${a.right}</span></div><div class="axis-btns">${b}</div></div>`;
    }).join('');
  }
  if(q.type==='rank'){ if(!state[q.id]) state[q.id]=q.items.map((_,k)=>k); return `<div class="rank" id="rank"></div>`; }
  return '';
}
function renderRank(q){const w=document.getElementById('rank');if(!w)return;
  w.innerHTML=state[q.id].map((idx,pos)=>`<div class="ritem"><span class="rbadge">${pos+1}</span><span class="rlabel">${q.items[idx]}</span><span class="rctrl"><button onclick="move('${q.id}',${pos},-1)">▲</button><button onclick="move('${q.id}',${pos},1)">▼</button></span></div>`).join('');}
function move(id,pos,d){const a=state[id],t=pos+d;if(t<0||t>=a.length)return;[a[pos],a[t]]=[a[t],a[pos]];renderRank(Q.find(x=>x.id===id));}
function pick(id,k){state[id]=k;document.querySelectorAll('#stage .opt').forEach(e=>e.classList.toggle('sel',+e.dataset.k===k));}
function pickMulti(id,k,max){if(!Array.isArray(state[id]))state[id]=[];const a=state[id],idx=a.indexOf(k);if(idx>=0)a.splice(idx,1);else{if(max&&a.length>=max)return;a.push(k);}document.querySelectorAll('#stage [data-k]').forEach(e=>e.classList.toggle('sel',a.includes(+e.dataset.k)));}
function pickScale(id,s){state[id+'_scale']=s;document.querySelectorAll('#stage .sbtn').forEach(e=>e.classList.toggle('sel',+e.dataset.s===s));}
function pickAxis(id,ax,s){state[id+'_ax_'+ax]=s;document.querySelectorAll(`#stage .ab[data-ax="${ax}"]`).forEach(e=>e.classList.toggle('sel',+e.dataset.s===s));}

function wire(q){
  if(q.type==='rank') renderRank(q);
  if(q&&q.id){
    const setv=(id,key)=>{const el=document.getElementById(id);if(el&&state[q.id+key]!=null)el.value=state[q.id+key];};
    setv('inp','_text');setv('why','_why');setv('other','_other');setv('extra','_extra');
    if(q.type==='choice'&&typeof state[q.id]==='number')document.querySelectorAll('#stage .opt').forEach(e=>e.classList.toggle('sel',+e.dataset.k===state[q.id]));
    if((q.type==='chips'||q.type==='brands')&&Array.isArray(state[q.id]))document.querySelectorAll('#stage [data-k]').forEach(e=>e.classList.toggle('sel',state[q.id].includes(+e.dataset.k)));
    if(q.type==='scale'&&state[q.id+'_scale']!=null)document.querySelectorAll('#stage .sbtn').forEach(e=>e.classList.toggle('sel',+e.dataset.s===state[q.id+'_scale']));
    if(q.type==='axes')q.axes.forEach(a=>{const v=state[q.id+'_ax_'+a.id];if(v!=null)document.querySelectorAll(`#stage .ab[data-ax="${a.id}"]`).forEach(e=>e.classList.toggle('sel',+e.dataset.s===v));});
  }
  const inp=document.getElementById('inp');if(inp)inp.focus();
}
function captureCurrent(){const q=Q[i];if(!q||!q.id)return;const g=(id,key)=>{const el=document.getElementById(id);if(el)state[q.id+key]=el.value;};g('inp','_text');g('why','_why');g('other','_other');g('extra','_extra');}

function buildPayload(){
  const answers=[];
  Q.forEach(q=>{if(!q.id)return;const e={id:q.id,n:q.n,group:q.group,question:q.title};
    if(q.type==='longtext'||q.type==='shorttext'){e.answer=state[q.id+'_text']||'';}
    else if(q.type==='choice'){const k=state[q.id];e.answer=(typeof k==='number')?q.options[k]:null;if(state[q.id+'_other'])e.other=state[q.id+'_other'];if(state[q.id+'_why'])e.why=state[q.id+'_why'];}
    else if(q.type==='chips'){const a=Array.isArray(state[q.id])?state[q.id]:[];e.answer=a.map(k=>q.options[k]);if(state[q.id+'_other'])e.other=state[q.id+'_other'];}
    else if(q.type==='brands'){const a=Array.isArray(state[q.id])?state[q.id]:[];e.answer=a.map(k=>q.brands[k].name);if(state[q.id+'_other'])e.other=state[q.id+'_other'];}
    else if(q.type==='scale'){e.answer=state[q.id+'_scale']||null;if(state[q.id+'_extra'])e.note=state[q.id+'_extra'];}
    else if(q.type==='axes'){e.answer=q.axes.map(a=>({axis:a.left+' ↔ '+a.right,value:state[q.id+'_ax_'+a.id]||null}));}
    else if(q.type==='rank'){const o=state[q.id]||q.items.map((_,k)=>k);e.answer=o.map((idx,pos)=>({rank:pos+1,value:q.items[idx]}));}
    answers.push(e);});
  return {version:'v3',name:state['NAME_text']||'',side:(typeof state['SIDE']==='number')?Q.find(q=>q.id==='SIDE').options[state['SIDE']]:null,answers,state:{...state},submitted_at:new Date().toISOString()};
}

function getRID(){let r=null;try{r=localStorage.getItem(RID_KEY);}catch(e){}if(!r){r=(self.crypto&&crypto.randomUUID)?crypto.randomUUID():('r-'+Date.now()+'-'+Math.floor(Math.random()*1e9));try{localStorage.setItem(RID_KEY,r);}catch(e){}}return r;}
let _sql=null;
async function getSql(){if(!_sql){const{neon}=await import('https://esm.sh/@neondatabase/serverless');_sql=neon(CONN);}return _sql;}
async function loadProgress(){try{const sql=await getSql();const rows=await sql`SELECT data FROM responses_v3 WHERE respondent_id=${getRID()} LIMIT 1`;if(rows.length&&rows[0].data&&rows[0].data.state){Object.assign(state,rows[0].data.state);return true;}}catch(e){console.warn('load failed:',e);}return false;}
async function saveProgress(isFinal){const rid=getRID();const p=buildPayload();p.completed=!!isFinal;const st=document.getElementById('savestatus');
  try{const sql=await getSql();await sql`INSERT INTO responses_v3 (respondent_id, name, data) VALUES (${rid}, ${p.name}, ${JSON.stringify(p)}) ON CONFLICT (respondent_id) DO UPDATE SET name=EXCLUDED.name, data=EXCLUDED.data, updated_at=now()`;if(isFinal&&st)st.textContent='✓ Saved — thank you! You can revisit this page anytime to review or edit.';}
  catch(err){console.error('save failed:',err);if(isFinal&&st)st.textContent='Could not reach the database — your answers are kept on this device; please let us know so we can retry.';}}

function next(){if(i<Q.length-1)go(1);}
function go(step){captureCurrent();const cur=document.querySelector('.screen');if(cur)cur.classList.remove('in');setTimeout(()=>{i=Math.max(0,Math.min(Q.length-1,i+step));render();saveProgress(Q[i].type==='end');},180);}
document.getElementById('next').onclick=()=>go(1);
document.getElementById('prev').onclick=()=>go(-1);
document.addEventListener('keydown',e=>{const q=Q[i];const inField=['INPUT','TEXTAREA'].includes((document.activeElement||{}).tagName);
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();next();return;}
  if(!inField&&q&&q.type==='choice'&&/^[a-zA-Z]$/.test(e.key)){const k=KEYS.indexOf(e.key.toUpperCase());if(k<q.options.length)pick(q.id,k);}
  if(!inField&&q&&(q.type==='chips'||q.type==='brands')&&/^[a-zA-Z]$/.test(e.key)){const k=KEYS.indexOf(e.key.toUpperCase());const len=(q.options||q.brands).length;if(k<len)pickMulti(q.id,k,q.max||0);}
  if(!inField&&q&&q.type==='scale'&&/^[1-9]$/.test(e.key)){const s=+e.key;if(s<=(q.scaleMax||5))pickScale(q.id,s);}
  if(!inField&&e.key==='ArrowDown'){e.preventDefault();go(1);}if(!inField&&e.key==='ArrowUp'){e.preventDefault();go(-1);}
});
render();
loadProgress().then((found)=>{if(found)render();});
</script>
